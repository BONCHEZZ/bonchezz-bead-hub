services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bonchezz}
      POSTGRES_USER: ${POSTGRES_USER:-bonchezz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bonchezz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bonchezz}:${POSTGRES_PASSWORD:-bonchezz}@db:5432/${POSTGRES_DB:-bonchezz}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-docker-development-only}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /
    environment:
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      - backend

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/media:ro
      - static_data:/static:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  media_data:
  static_data:
